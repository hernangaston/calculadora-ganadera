<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carga animal</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>

    <main class="container">

        <!-- HEADER -->
        <header class="header">
            <h1>¿CÓMO ESTOY DE CARGA?</h1>
            <p class="subtitle">
                Una cuenta rápida para chequear si el campo banca el rodeo actual
            </p>
        </header>

        <!-- INPUTS -->
        <section class="card">
            <h2>Cargá los datos</h2>

            <div class="field">
                <label for="hectareas">Hectáreas disponibles</label>
                <input type="number" id="hectareas" name="hectareas" placeholder="Ej: 120" min="0" step="0.01">
            </div>

            <div class="field">
                <label for="tipoCampo">Tipo de campo</label>
                <select id="tipoCampo" name="tipoCampo">
                    <option value="">Seleccionar</option>
                    <option value="natural">Campo natural</option>
                    <option value="pastura">Pastura implantada</option>
                    <option value="verdeo">Verdeo</option>
                </select>
            </div>

            <div class="field">
                <label for="estadoPasto">Estado del pasto</label>
                <select id="estadoPasto" name="estadoPasto">
                    <option value="">Seleccionar</option>
                    <option value="bueno">Bueno</option>
                    <option value="regular">Regular</option>
                    <option value="malo">Malo</option>
                </select>
            </div>

            <div class="field">
                <label for="animales">Cantidad de animales</label>
                <input type="number" id="animales" name="animales" placeholder="Ej: 180" min="0" step="1">
            </div>

            <div class="field">
                <label for="peso">Peso promedio por animal (kg)</label>
                <input type="number" id="peso" name="peso" placeholder="Ej: 320" min="0" step="0.1">
            </div>
        </section>

        <!-- BOTÓN -->
        <button id="btnCalcular" class="btn-primary" type="button">
            👉 CALCULAR CARGA
        </button>

        <!-- RESULTADOS -->
        <section class="card hidden" id="resultado">
            <h2>Resultado</h2>

            <p class="result-main">
                Tu carga actual:<br>
                <span id="cargaActual">X,XX EV/ha</span>
            </p>

            <p id="cargaReferencia"></p>

            <div id="decision" class="scenario"></div>

            <p class="footer">
                1 EV ≈ animal de 400 kg. Valores orientativos según tipo y estado del pasto.
            </p>
        </section>

    </main>

    <script src="carga.js"></script>

    <script src="ui.js"></script>
</body>

</html>
